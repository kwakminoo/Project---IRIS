# Iris용 SearXNG — P2: 단일 Google 의존 완화 (다중 엔진)
# API: SEARXNG_ENGINES 환경변수와 맞출 것 (기본 google,bing,duckduckgo,wikipedia)
# 문서: https://docs.searxng.org/admin/settings/settings.html

use_default_settings:
  engines:
    keep_only:
      - google
      - bing
      - duckduckgo
      - wikipedia

server:
  # 배포 시 반드시 임의 문자열로 교체
  secret_key: "iris-searxng-local-change-me"
  # 로컬 Iris API(JSON) 호출 시 rate limit 완화
  limiter: false
  image_proxy: false
  port: 8080
  bind_address: "0.0.0.0"

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "ko-KR"
  formats:
    - html
    - json

general:
  instance_name: "Iris SearXNG"
  debug: false
