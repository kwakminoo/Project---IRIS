[pytest]
testpaths = tests
pythonpath = .
markers =
    integration: Iris 컴포넌트 간 실제 연결을 검증하는 테스트
    windows_only: Windows API가 필요한 테스트
    windows_smoke: 실제 Windows 앱과 UI를 조작하는 테스트
    windows_smoke_gui: Windows GUI 세션이 필요한 스모크 테스트 (Hosted Runner 제약 가능)
    external_service: 외부 API 또는 네트워크 서비스가 필요한 테스트
    requires_model: 실제 AI 모델 실행이 필요한 테스트
    slow: 상대적으로 오래 걸리는 테스트
    ide_e2e: 내장 Theia IDE E2E 검증
filterwarnings =
    ignore::DeprecationWarning
