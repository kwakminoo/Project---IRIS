<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Iris</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        width: 320px;
        padding: 10px;
      }
      label {
        display: block;
        margin: 8px 0 4px;
      }
      button {
        margin-top: 10px;
        width: 100%;
        padding: 8px;
      }
    </style>
  </head>
  <body>
    <h3>Iris 탭 모니터링</h3>
    <p style="font-size: 12px; color: #444">
      현재 탭을 허용 목록에 추가하면 요약 텍스트만 로컬 Iris로 전송됩니다.
    </p>
    <label>로컬 포트</label>
    <input id="port" type="number" value="17777" />
    <label>토큰 (.env 의 IRIS_EXTENSION_TOKEN)</label>
    <input id="token" type="password" placeholder="선택" />
    <button id="allow">현재 탭 허용</button>
    <button id="revoke">현재 탭 제거</button>
    <pre id="out" style="font-size: 11px; white-space: pre-wrap"></pre>
    <script src="popup.js"></script>
  </body>
</html>
