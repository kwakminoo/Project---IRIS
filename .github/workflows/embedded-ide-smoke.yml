name: embedded-ide-smoke

on:
  workflow_dispatch:

jobs:
  embedded-ide:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: iris
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Iris dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Iris IDE
        working-directory: ${{ github.workspace }}
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/setup-iris-ide.ps1
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/build-iris-ide.ps1

      - name: Embedded IDE verify (no GUI E2E)
        working-directory: ${{ github.workspace }}
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/verify-embedded-ide.ps1 -SkipE2E

      - name: Upload IDE logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ide-logs
          path: |
            ~/.iris/logs/
            iris/artifacts/
