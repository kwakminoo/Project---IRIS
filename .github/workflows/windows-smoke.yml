name: Windows Smoke

on:
  workflow_dispatch:
    inputs:
      include_gui:
        description: "GUI smoke (Notepad·UIA) 포함 — Hosted Runner에서 불안정할 수 있음"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

env:
  IRIS_SMOKE_ARTIFACTS: artifacts/windows-smoke
  IRIS_SMOKE_SCREENSHOTS: "1"

jobs:
  windows-smoke:
    name: windows-smoke
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            iris/requirements.txt
            iris/requirements-base.txt
            iris/requirements-windows.txt
            iris/requirements-dev.txt

      - name: Log environment
        shell: pwsh
        run: |
          Write-Host "OS:" (Get-CimInstance Win32_OperatingSystem).Caption
          Write-Host "Resolution:" (Get-CimInstance Win32_VideoController).CurrentHorizontalResolution "x" (Get-CimInstance Win32_VideoController).CurrentVerticalResolution
          python --version

      - name: Install dependencies
        working-directory: iris
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify pytest-timeout
        working-directory: iris
        run: python -m pytest --help | findstr /C:"--timeout"

      - name: Prepare artifact directory
        working-directory: iris
        shell: pwsh
        run: |
          if (Test-Path artifacts/windows-smoke) { Remove-Item -Recurse -Force artifacts/windows-smoke }
          New-Item -ItemType Directory -Force -Path artifacts/windows-smoke | Out-Null
          Set-Content -Path artifacts/windows-smoke/created-processes.json -Value "[]" -Encoding utf8

      - name: Run non-GUI smoke tests
        id: smoke_nogui
        working-directory: iris
        shell: pwsh
        run: |
          python -m pytest tests/windows_smoke -m "windows_smoke and not windows_smoke_gui" -v --timeout=120 `
            --junitxml=artifacts/windows-smoke/junit-nogui.xml `
            2>&1 | Tee-Object -FilePath artifacts/windows-smoke/pytest-nogui.log

      - name: Run GUI smoke tests
        id: smoke_gui
        if: inputs.include_gui == 'true'
        working-directory: iris
        shell: pwsh
        run: |
          python -m pytest tests/windows_smoke -m windows_smoke_gui -v --timeout=120 `
            --junitxml=artifacts/windows-smoke/junit-gui.xml `
            2>&1 | Tee-Object -FilePath artifacts/windows-smoke/pytest-gui.log

      - name: Cleanup registered smoke processes
        if: always()
        shell: pwsh
        run: |
          & "${{ github.workspace }}/scripts/cleanup-smoke-processes.ps1" -ArtifactsRoot "${{ github.workspace }}/iris/artifacts/windows-smoke"

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-smoke-artifacts
          path: |
            iris/artifacts/windows-smoke/
            iris/.pytest_cache/
          if-no-files-found: warn
