name: Windows Smoke

on:
  workflow_dispatch:

jobs:
  windows-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: iris/requirements.txt

      - name: Install dependencies
        working-directory: iris
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run Windows smoke tests
        working-directory: iris
        run: python -m pytest -m windows_smoke -q --timeout=120

      - name: Upload smoke log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-smoke-log
          path: iris/.pytest_cache/
