name: Test

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  windows-py311:
    name: test / windows-py311
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            iris/requirements.txt
            iris/requirements-base.txt
            iris/requirements-windows.txt
            iris/requirements-dev.txt

      - name: Install dependencies
        working-directory: iris
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify pytest-timeout
        working-directory: iris
        run: python -m pytest --help | findstr /C:"--timeout"

      - name: Compile
        run: python -m compileall iris -q

      - name: Run tests
        working-directory: iris
        run: python -m pytest -q -m "not windows_smoke and not integration"

      - name: Upload pytest log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log-windows-py311
          path: iris/.pytest_cache/

  windows-py312:
    name: test / windows-py312
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            iris/requirements.txt
            iris/requirements-base.txt
            iris/requirements-windows.txt
            iris/requirements-dev.txt

      - name: Install dependencies
        working-directory: iris
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile
        run: python -m compileall iris -q

      - name: Run tests
        working-directory: iris
        run: python -m pytest -q -m "not windows_smoke and not integration"

      - name: Upload pytest log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log-windows-py312
          path: iris/.pytest_cache/

  linux-domain:
    name: test / linux-domain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            iris/requirements-base.txt
            iris/requirements-dev.txt

      - name: Install OS dependencies (PyQt6 headless)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-xinerama0 \
            libxcb-xfixes0 libxcb-shape0 libdbus-1-3

      - name: Install dependencies (base + dev only)
        working-directory: iris
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-base.txt -r requirements-dev.txt

      - name: Compile
        run: python -m compileall iris -q

      - name: Run tests (non-Windows)
        working-directory: iris
        run: python -m pytest -q -m "not windows_smoke and not integration and not windows_only"

      - name: Upload pytest log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log-linux-domain
          path: iris/.pytest_cache/
