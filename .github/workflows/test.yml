name: Test

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  windows-py311:
    name: test / windows-py311
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            iris/requirements.txt
            iris/requirements-base.txt
            iris/requirements-windows.txt
            iris/requirements-dev.txt

      - name: Install dependencies
        working-directory: iris
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify pytest-timeout
        working-directory: iris
        run: python -m pytest --help | findstr /C:"--timeout"

      - name: Compile
        run: python -m compileall iris -q

      - name: Run tests
        working-directory: iris
        run: python -m pytest -q -m "not windows_smoke and not external_service and not requires_model"

      - name: Upload pytest log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log-windows-py311
          path: iris/.pytest_cache/

  windows-py312:
    name: test / windows-py312
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            iris/requirements.txt
            iris/requirements-base.txt
            iris/requirements-windows.txt
            iris/requirements-dev.txt

      - name: Install dependencies
        working-directory: iris
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify pytest-timeout
        working-directory: iris
        run: python -m pytest --help | findstr /C:"--timeout"

      - name: Compile
        run: python -m compileall iris -q

      - name: Run tests
        working-directory: iris
        run: python -m pytest -q -m "not windows_smoke and not external_service and not requires_model"

      - name: Upload pytest log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log-windows-py312
          path: iris/.pytest_cache/

  windows-integration:
    name: test / windows-integration
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            iris/requirements.txt
            iris/requirements-base.txt
            iris/requirements-windows.txt
            iris/requirements-dev.txt

      - name: Install dependencies
        working-directory: iris
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile
        run: python -m compileall iris -q

      - name: Run integration tests
        working-directory: iris
        run: python -m pytest -v -m "integration and not windows_smoke and not external_service and not requires_model" --timeout=180

      - name: Upload pytest log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log-windows-integration
          path: iris/.pytest_cache/
