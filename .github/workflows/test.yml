name: Test

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  test-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: iris/requirements.txt

      - name: Install dependencies
        working-directory: iris
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Compile
        run: python -m compileall iris -q

      - name: Run tests
        working-directory: iris
        run: python -m pytest -q --ignore=tests/test_windows_smoke.py

      - name: Upload pytest log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log-py${{ matrix.python-version }}
          path: iris/.pytest_cache/

  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: iris/requirements.txt

      - name: Install dependencies
        working-directory: iris
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Compile
        run: python -m compileall iris -q

      - name: Run tests (non-Windows)
        working-directory: iris
        run: python -m pytest -q --ignore=tests/test_windows_smoke.py
